        <script>
    function setDataBsContent(columnIndex, elementId) {
        var url = "https://sheets.googleapis.com/v4/spreadsheets/1WlH7dcRNeIYNvG4e0TGHvJads6KULYOR2kfSLNz4Xyo/values/A2:B8?key=AIzaSyCCr-SQHp7a8hy9oJfL1WZmSAiQOgDt2Ng";

        // Event listener for the button with element ID
        document.getElementById(elementId).addEventListener("click", function() {
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.values.length > 0 && data.values.length > columnIndex && data.values[columnIndex].length > 1) {
                        var originalValue = parseFloat(data.values[columnIndex][1]);
                        if (!isNaN(originalValue)) {
                            var roundedPercentage = Math.round(originalValue) + '%';
                            alert("Mức độ đầy của thùng rác: " + roundedPercentage);
                        } else {
                            console.error('Invalid numeric value in the data:', data.values[columnIndex][1]);
                        }
                    } else {
                        console.error('Invalid columnIndex or data structure:', columnIndex);
                    }
                })
                .catch(error => console.error('Error:', error));
        });
    }
    // Call the setDataBsContent function with columnIndex = 3 and elementId = "button_b1"
    setDataBsContent(0, "button_b1");

    // Call the setDataBsContent function with columnIndex = 4 and elementId = "button_b2"
    setDataBsContent(1, "button_b2");
    setDataBsContent(2, "button_b3");
    setDataBsContent(3, "button_b4");

    // Function to close the popover
    function closePopover(elementId) {
        var element = document.getElementById(elementId);
        if (element) {
            var popoverInstance = bootstrap.Popover.getInstance(element);
            if (popoverInstance) {
                popoverInstance.hide();
            }
        }
    }
        </script>
